<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALISTENIA PRO</title>
<link rel="manifest" href="/calistenia/manifest.json">
<meta name="theme-color" content="#0e0e0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calistenia">
<link rel="apple-touch-icon" href="/calistenia/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e; --surface: #161616; --surface2: #1f1f1f; --border: #2a2a2a;
    --accent: #e8ff00; --accent2: #ff6b35; --rest: #00d4aa; --text: #f0f0f0;
    --muted: #666; --danger: #ff4545; --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
  
  .view { display: none; min-height: 100vh; flex-direction: column; }
  .view.active { display: flex; }


  /* HOME */
  #view-home { padding: 24px 20px; gap: 20px; overflow-y: auto; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; line-height: 1; letter-spacing: 2px; }
  .logo span { color: var(--accent); }
  .home-tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 10px; padding: 4px; }
  .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 7px; color: var(--muted); background: none; cursor: pointer; font-size: 13px; }
  .tab-btn.active { background: var(--surface2); color: var(--text); }
  .tab-panel { display: none; flex-direction: column; gap: 12px; margin-top: 10px; }
  .tab-panel.active { display: flex; }


  /* CARDS */
  .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }


  /* SEMANA */
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 4px; display: flex; flex-direction: column; align-items: center; gap: 6px; min-height: 90px; cursor: pointer; }
  .day-label { font-family: 'Bebas Neue'; font-size: 11px; color: var(--muted); }
  .day-cell.has-routine { border-color: var(--accent); background: rgba(232,255,0,0.05); }


  /* EDITOR */
  .editor-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  input, textarea { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; width: 100%; font-family: inherit; }
  .exercise-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
  .phrase-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; background: var(--surface2); padding: 6px; border-radius: 6px; }


  /* WORKOUT */
  #view-workout { background: #000; text-align: center; justify-content: center; }
  .timer-number { font-family: 'Bebas Neue'; font-size: 120px; line-height: 1; }
  .phase-badge { font-family: 'Bebas Neue'; padding: 5px 20px; border-radius: 20px; border: 1px solid; margin-bottom: 10px; letter-spacing: 2px; }
  .phase-badge.exercise { color: var(--accent); border-color: var(--accent); }
  .phase-badge.rest { color: var(--rest); border-color: var(--rest); }


  /* MODALS */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: flex-end; z-index: 1000; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: var(--bg); width: 100%; padding: 25px; border-radius: 25px 25px 0 0; max-height: 80vh; overflow-y: auto; }
</style>
</head>
<body>


<div id="view-home" class="view active">
  <div style="display:flex; justify-content:space-between; align-items:flex-end;">
    <div class="logo">CALIS<span>TENIA</span></div>
    <button onclick="openEditor()" style="background:var(--accent); border:none; padding:10px 18px; border-radius:8px; font-weight:bold;">+ NUEVA</button>
  </div>
  <div class="home-tabs">
    <button class="tab-btn active" onclick="switchTab('routines')">Rutinas</button>
    <button class="tab-btn" onclick="switchTab('week')">Semana</button>
    <button class="tab-btn" onclick="switchTab('history')">Historial</button>
  </div>
  <div id="tab-routines" class="tab-panel active"><div id="routines-list"></div></div>
  <div id="tab-week" class="tab-panel"><div id="week-grid" class="week-grid"></div></div>
  <div id="tab-history" class="tab-panel"><div id="history-list"></div></div>
</div>


<div id="view-editor" class="view">
  <div class="editor-body">
    <h2 style="font-family:'Bebas Neue'">CONFIGURACIÓN</h2>
    <input type="text" id="edit-name" placeholder="Nombre de la Rutina">
    <textarea id="edit-desc" placeholder="Nota de voz inicial (al empezar)"></textarea>
    <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size:12px; color:var(--muted)">Descanso global (seg):</span>
        <input type="number" id="edit-rest" value="30" style="width:80px">
    </div>
    <div id="edit-exercises-list"></div>
    <button onclick="addExerciseField()" style="padding:15px; background:var(--surface2); border:1px dashed var(--border); color:var(--muted); border-radius:10px;">+ Añadir Ejercicio</button>
  </div>
  <div style="padding:20px; display:flex; gap:10px;">
    <button onclick="goHome()" style="flex:1; padding:18px; border-radius:12px; background:var(--surface); border:none; color:white;">CANCELAR</button>
    <button onclick="saveRoutine()" style="flex:2; padding:18px; border-radius:12px; background:var(--accent); border:none; color:black; font-weight:bold;">GUARDAR</button>
  </div>
</div>


<div id="view-workout" class="view">
  <div id="phase-badge" class="phase-badge">PREP</div>
  <div id="current-ex-name" style="font-family:'Bebas Neue'; font-size:42px;">-</div>
  <div id="timer-display" class="timer-number">0</div>
  <div id="next-hint" style="color:var(--muted); margin-bottom:40px;">Siguiente: -</div>
  <div style="display:flex; gap:15px; padding:0 30px;">
    <button onclick="togglePause()" id="btn-pause" style="flex:1; padding:20px; border-radius:15px; background:var(--surface); color:white; border:1px solid var(--border);">PAUSA</button>
    <button onclick="goHome()" style="width:65px; border-radius:15px; background:var(--danger); border:none; color:white;">✕</button>
  </div>
</div>


<div id="modal-preview" class="modal-overlay" onclick="this.classList.remove('open')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <h2 id="pre-name" style="font-family:'Bebas Neue'; font-size:32px;">-</h2>
    <div style="display:flex; justify-content:space-between; align-items:center; margin:20px 0; background:var(--surface); padding:15px; border-radius:12px;">
        <span>Vueltas al circuito:</span>
        <div style="display:flex; gap:15px; align-items:center;">
            <button onclick="changePreviewReps(-1)" style="width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:none; color:white;">-</button>
            <b id="pre-reps" style="font-size:24px; color:var(--accent)">1</b>
            <button onclick="changePreviewReps(1)" style="width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:none; color:white;">+</button>
        </div>
    </div>
    <button onclick="confirmStart()" style="width:100%; padding:20px; background:var(--accent); color:black; font-weight:bold; border-radius:12px; border:none;">¡EMPEZAR!</button>
  </div>
</div>


<div id="modal-day" class="modal-overlay" onclick="this.classList.remove('open')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <h2 id="modal-day-name" style="font-family:'Bebas Neue'; margin-bottom:15px;">DÍA</h2>
    <div id="day-options" style="display:flex; flex-direction:column; gap:10px;"></div>
    <button onclick="assignToDay(null)" style="margin-top:15px; width:100%; padding:12px; border:1px dashed var(--danger); color:var(--danger); background:none; border-radius:10px;">Quitar rutina</button>
  </div>
</div>


<script>
let routines = JSON.parse(localStorage.getItem('cali_final_v10_r') || '[]');
let weekPlan = JSON.parse(localStorage.getItem('cali_final_v10_w') || '{}');
let history = JSON.parse(localStorage.getItem('cali_final_v10_h') || '[]');
let editingId = null, selectedDayIdx = null, currentRoutine = null, previewReps = 1;
let timer = null, phases = [], pIdx = 0, timeLeft = 0, isPaused = false;


// --- TOQUES CALENDARIO ---
let touchTimer;
function handleDayStart(idx) { touchTimer = setTimeout(() => { touchTimer = null; openDayModal(idx); }, 600); }
function handleDayEnd(idx) {
    if (touchTimer) {
        clearTimeout(touchTimer);
        const rid = weekPlan[idx];
        if(rid) openPreview(rid);
        else openDayModal(idx);
    }
}


function openPreview(id) {
    currentRoutine = routines.find(x => x.id === id);
    if(!currentRoutine) return;
    previewReps = 1;
    document.getElementById('pre-name').innerText = currentRoutine.name;
    document.getElementById('pre-reps').innerText = previewReps;
    document.getElementById('modal-preview').classList.add('open');
}


function changePreviewReps(v) { previewReps = Math.max(1, previewReps + v); document.getElementById('pre-reps').innerText = previewReps; }


function confirmStart() {
    document.getElementById('modal-preview').classList.remove('open');
    startWorkout(currentRoutine, previewReps);
}


// --- CALENDARIO ---
function renderWeek() {
    const days = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
    document.getElementById('week-grid').innerHTML = days.map((d, i) => {
        const r = routines.find(x => x.id === weekPlan[i]);
        return `<div class="day-cell ${r?'has-routine':''}" 
                 onmousedown="handleDayStart(${i})" onmouseup="handleDayEnd(${i})"
                 ontouchstart="handleDayStart(${i})" ontouchend="handleDayEnd(${i})">
            <span class="day-label">${d}</span>
            <div style="font-size:24px">${r ? '💪' : '·'}</div>
        </div>`;
    }).join('');
}


function openDayModal(idx) {
    selectedDayIdx = idx;
    document.getElementById('modal-day-name').innerText = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'][idx];
    document.getElementById('day-options').innerHTML = routines.map(r => `
        <button onclick="assignToDay('${r.id}')" style="padding:15px; border-radius:10px; background:var(--surface2); border:1px solid var(--border); color:white; text-align:left;">💪 ${r.name}</button>
    `).join('');
    document.getElementById('modal-day').classList.add('open');
}


function assignToDay(rid) {
    if(rid) weekPlan[selectedDayIdx] = rid; else delete weekPlan[selectedDayIdx];
    localStorage.setItem('cali_final_v10_w', JSON.stringify(weekPlan));
    document.getElementById('modal-day').classList.remove('open');
    renderWeek();
}


// --- EDITOR ---
function addExerciseField(ex = {name:'', dur:30, tech:'', phrases:[]}) {
    const div = document.createElement('div');
    div.className = 'exercise-item';
    div.innerHTML = `
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" placeholder="Ejercicio" value="${ex.name}" class="ex-name">
            <input type="number" value="${ex.dur}" style="width:70px" class="ex-dur">
            <button onclick="this.parentElement.parentElement.remove()" style="color:var(--danger); background:none; border:none; font-size:22px;">×</button>
        </div>
        <textarea placeholder="Descripción técnica (Visual)" class="ex-tech" style="height:50px; font-size:12px; background:var(--surface2); margin-bottom:10px;">${ex.tech || ''}</textarea>
        <div class="ph-list"></div>
        <button onclick="addPhraseRow(this.previousElementSibling)" style="font-size:11px; color:var(--accent); background:none; border:none;">+ FRASE VOZ</button>`;
    if(ex.phrases) ex.phrases.forEach(p => addPhraseRow(div.querySelector('.ph-list'), p));
    document.getElementById('edit-exercises-list').appendChild(div);
}


function addPhraseRow(container, p = {text:'', sec:5}) {
    const row = document.createElement('div');
    row.className = 'phrase-row';
    row.innerHTML = `<input type="text" placeholder="Frase..." value="${p.text}" class="ph-text" style="flex:1; border:none;"><input type="number" value="${p.sec}" class="ph-sec" style="width:40px; background:none; border:none; color:var(--accent); text-align:center;"><button onclick="this.parentElement.remove()" style="color:var(--muted); border:none; background:none;">×</button>`;
    container.appendChild(row);
}


function saveRoutine() {
    const name = document.getElementById('edit-name').value;
    if(!name) return alert("Nombre obligatorio");
    const exercises = Array.from(document.querySelectorAll('.exercise-item')).map(it => ({
        name: it.querySelector('.ex-name').value,
        dur: parseInt(it.querySelector('.ex-dur').value) || 30,
        tech: it.querySelector('.ex-tech').value,
        phrases: Array.from(it.querySelectorAll('.phrase-row')).map(row => ({
            text: row.querySelector('.ph-text').value,
            sec: parseInt(row.querySelector('.ph-sec').value) || 0
        })).filter(ph => ph.text)
    })).filter(e => e.name);


    const r = { id: editingId || Date.now().toString(), name, desc: document.getElementById('edit-desc').value, rest: parseInt(document.getElementById('edit-rest').value) || 30, exercises };
    if(editingId) routines = routines.map(x => x.id === editingId ? r : x); else routines.push(r);
    localStorage.setItem('cali_final_v10_r', JSON.stringify(routines));
    goHome();
}


// --- MOTOR WORKOUT ---
function startWorkout(r, reps) {
    currentRoutine = r;
    phases = [];
    if(r.desc) speak(r.desc);
    for(let i=0; i<reps; i++) {
        r.exercises.forEach((ex, exIdx) => {
            phases.push({ type:'prep', name: ex.name, dur: 5 });
            phases.push({ type:'exercise', name: ex.name, dur: ex.dur, phrases: ex.phrases });
            // Solo añadir descanso si no es el último ejercicio de la última vuelta
            if(exIdx < r.exercises.length - 1 || i < reps - 1) {
                const nextEx = (exIdx < r.exercises.length - 1) ? r.exercises[exIdx+1].name : r.exercises[0].name;
                phases.push({ type:'rest', name:'Descanso', dur: r.rest, next: nextEx });
            }
        });
    }
    pIdx = 0; showView('workout');
    setTimeout(runPhase, 2000);
}


function runPhase() {
    if(pIdx >= phases.length) { 
        speak("Rutina finalizada, buen trabajo"); 
        saveHistory(currentRoutine.name);
        setTimeout(goHome, 3500); 
        return; 
    }
    const p = phases[pIdx];
    timeLeft = p.dur; isPaused = false;
    speak(p.type === 'exercise' ? "¡Ya! " + p.name : p.type === 'prep' ? "Prepárate: " + p.name : "Descansa");
    updateUI();
    if(timer) clearInterval(timer);
    timer = setInterval(() => {
        if(isPaused) return;
        timeLeft--;
        
        // Voz de cuenta atrás
        if(timeLeft <= 3 && timeLeft > 0) speak(timeLeft);
        
        // NUEVO: Aviso de siguiente ejercicio en el descanso (faltando 10s)
        if(p.type === 'rest' && timeLeft === 10 && p.next) {
            speak("Siguiente ejercicio: " + p.next);
        }


        // Frases motivacionales programadas
        if(p.type === 'exercise' && p.phrases) {
            const elapsed = p.dur - timeLeft;
            p.phrases.forEach(ph => { if(ph.sec === elapsed) speak(ph.text); });
        }


        if(timeLeft < 0) { pIdx++; runPhase(); } else updateUI();
    }, 1000);
}


function updateUI() {
    const p = phases[pIdx];
    if(!p) return;
    const badge = document.getElementById('phase-badge');
    badge.className = 'phase-badge ' + p.type;
    badge.innerText = p.type.toUpperCase();
    document.getElementById('current-ex-name').innerText = p.name;
    document.getElementById('timer-display').innerText = timeLeft;
    const n = phases[pIdx+1];
    document.getElementById('next-hint').innerText = n ? "Próximo: " + n.name : "¡Final!";
}


function speak(t) { 
    if(!isNaN(t)) window.speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 1.1;
    window.speechSynthesis.speak(m); 
}


// --- HISTORIAL ---
function saveHistory(name) {
    const entry = { id: Date.now(), name, date: new Date().toLocaleString('es-ES', { weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) };
    history.unshift(entry);
    localStorage.setItem('cali_final_v10_h', JSON.stringify(history));
}
function deleteHistoryItem(id) {
    history = history.filter(h => h.id !== id);
    localStorage.setItem('cali_final_v10_h', JSON.stringify(history));
    renderHistory();
}
function renderHistory() {
    document.getElementById('history-list').innerHTML = history.map(h => `
        <div class="item-card">
            <div style="flex:1"><b>${h.name}</b><br><small style="color:var(--muted)">${h.date}</small></div>
            <button onclick="deleteHistoryItem(${h.id})" style="background:none; border:none; color:var(--danger); font-size:18px;">✕</button>
        </div>`).join('');
}


// --- NAVEGACIÓN ---
function showView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById('view-'+id).classList.add('active'); }
function goHome() { 
    if(timer) clearInterval(timer); timer = null;
    window.speechSynthesis.cancel(); pIdx = 99999;
    renderRoutines(); renderWeek(); renderHistory(); showView('home'); 
}
function switchTab(t) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(t)));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-'+t));
}
function openEditor(id = null) {
    editingId = id; document.getElementById('edit-exercises-list').innerHTML = '';
    if(id) {
        const r = routines.find(x => x.id === id);
        document.getElementById('edit-name').value = r.name;
        document.getElementById('edit-desc').value = r.desc;
        document.getElementById('edit-rest').value = r.rest;
        r.exercises.forEach(ex => addExerciseField(ex));
    } else {
        document.getElementById('edit-name').value = ''; document.getElementById('edit-desc').value = ''; addExerciseField();
    }
    showView('editor');
}
function renderRoutines() {
    document.getElementById('routines-list').innerHTML = routines.map(r => `
        <div class="item-card" onclick="openPreview('${r.id}')">
            <div style="font-size:24px;">💪</div>
            <div style="flex:1"><b>${r.name}</b><br><small style="color:var(--muted)">${r.exercises.length} ejers.</small></div>
            <div style="display:flex; gap:8px;">
                <button onclick="event.stopPropagation(); openEditor('${r.id}')" style="background:var(--surface2); color:white; border:none; padding:10px; border-radius:8px;">✏️</button>
                <button onclick="event.stopPropagation(); deleteRoutine('${r.id}')" style="background:var(--surface2); color:var(--danger); border:none; padding:10px; border-radius:8px;">✕</button>
            </div>
        </div>`).join('');
}
function deleteRoutine(id) { if(confirm('¿Borrar?')) { routines = routines.filter(r => r.id !== id); localStorage.setItem('cali_final_v10_r', JSON.stringify(routines)); renderRoutines(); } }
function togglePause() { isPaused = !isPaused; document.getElementById('btn-pause').innerText = isPaused ? 'CONTINUAR' : 'PAUSA'; }


renderRoutines(); renderWeek(); renderHistory();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/calistenia/sw.js');
}
</script>
</body>
</html>
